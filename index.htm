    <body>
     <div class="container mb-5">
        <div class="row">
            <div class="col-md-6 offset-md-3">
                <div class="card">
                    <div class="card-body">
                        <form action="" id="postForm">
                            <div class="form-group">
                                <label for="title">Title*</label>
                                 <input type="text" class="form-control" id="title">
                            </div>
                            <div class="form-group">
                                <label for="body">Body*</label>
                                 <input type="text" class="form-control" id="body">
                            </div>
                            <div class="form-group">
                                <label for="userId">user Id *</label>
                                 <select type="text" class="form-control" id="userId">
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                    <option value="9">9</option>
                                    <option value="10">10</option>
                                </select>  
                            </div>
                            <button class="btn btn-block btn-outline-primary button" id="addPost">Add Post</button>
                            <button type="button" class="btn btn-block btn-outline-primary d-none button" id="updatePost">Update Post</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
     </div>

                        </div>
